<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ErrorTrack</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="barra">
        <button class="barramudar" aria-label="Expandir barra">›</button>

        <nav class="barramenu">
            <a href="#" class="barraitem">
                <span class="barraicone">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="M277.8 8.6c-12.3-11.4-31.3-11.4-43.5 0l-224 208c-9.6 9-12.8 22.9-8 35.1S18.8 272 32 272l16 0 0 176c0 35.3 28.7 64 64 64l288 0c35.3 0 64-28.7 64-64l0-176 16 0c13.2 0 25-8.1 29.8-20.3s1.6-26.2-8-35.1l-224-208zM240 320l32 0c26.5 0 48 21.5 48 48l0 96-128 0 0-96c0-26.5 21.5-48 48-48z"/></svg>
                </span>
                <span class="barratexto">Início</span>
            </a>
            <a href="#" class="barraitem">
                <span class="barraicone">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="M195.1 9.5C198.1-5.3 211.2-16 226.4-16l59.8 0c15.2 0 28.3 10.7 31.3 25.5L332 79.5c14.1 6 27.3 13.7 39.3 22.8l67.8-22.5c14.4-4.8 30.2 1.2 37.8 14.4l29.9 51.8c7.6 13.2 4.9 29.8-6.5 39.9L447 233.3c.9 7.4 1.3 15 1.3 22.7s-.5 15.3-1.3 22.7l53.4 47.5c11.4 10.1 14 26.8 6.5 39.9l-29.9 51.8c-7.6 13.1-23.4 19.2-37.8 14.4l-67.8-22.5c-12.1 9.1-25.3 16.7-39.3 22.8l-14.4 69.9c-3.1 14.9-16.2 25.5-31.3 25.5l-59.8 0c-15.2 0-28.3-10.7-31.3-25.5l-14.4-69.9c-14.1-6-27.2-13.7-39.3-22.8L73.5 432.3c-14.4 4.8-30.2-1.2-37.8-14.4L5.8 366.1c-7.6-13.2-4.9-29.8 6.5-39.9l53.4-47.5c-.9-7.4-1.3-15-1.3-22.7s.5-15.3 1.3-22.7L12.3 185.8c-11.4-10.1-14-26.8-6.5-39.9L35.7 94.1c7.6-13.2 23.4-19.2 37.8-14.4l67.8 22.5c12.1-9.1 25.3-16.7 39.3-22.8L195.1 9.5zM256.3 336a80 80 0 1 0 -.6-160 80 80 0 1 0 .6 160z"/></svg>
                </span>
                <span class="barratexto">Configurações</span>
            </a>
        </nav>
    </div>

    <main class="conteudo">
        <section class="crud">
            <h1>CRUD de Alunos</h1>

            <form id="alunoForm" class="formulario">
                <input type="hidden" id="alunoId">

                <label for="nome">Nome</label>
                <input type="text" id="nome" placeholder="Nome do aluno" required>

                <label for="materia">Matéria</label>
                <input type="text" id="materia" placeholder="Matéria" required>

                <button type="submit" id="formButton">Criar</button>
                <button type="button" id="cancelarAtualizacao" class="secundario hidden">Cancelar</button>
            </form>

            <form id="buscarForm" class="buscar">
                <label for="buscarId">Buscar por ID</label>
                <input type="number" id="buscarId" placeholder="ID do aluno" min="1">
                <button type="submit">Buscar</button>
            </form>

            <div id="mensagem" class="mensagem" aria-live="polite"></div>
            <div id="listaAlunos" class="lista"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
